{% extends 'base.html' %} {% block content %}
<div
  class="card"
  style="max-width: 480px; margin: 60px auto; text-align: center"
>
  <h2>📱 Set Up Two-Factor Authentication</h2>
  <p style="color: #a0aec0; margin-bottom: 20px; font-size: 14px">
    Scan this QR code with Google Authenticator or Authy.
  </p>
  <img
    src="data:image/png;base64,{{ qr_code }}"
    style="width: 200px; height: 200px; border-radius: 8px; margin-bottom: 20px"
  />
  <form
    method="POST"
    action="{{ url_for('auth.verify_2fa_setup', user_id=user.id) }}"
  >
    <div class="form-group">
      <label>Enter the 6-digit code from your app</label>
      <input
        type="text"
        name="token"
        required
        placeholder="000000"
        maxlength="6"
        style="text-align: center; font-size: 22px; letter-spacing: 8px"
      />
    </div>
    <button type="submit" class="btn btn-success" style="width: 100%">
      Verify & Enable 2FA
    </button>
  </form>
</div>
{% endblock %}
