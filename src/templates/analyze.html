{% extends 'base.html' %} {% block content %}
<div class="card">
  <h2>🔍 Analyze Email</h2>
  <form method="POST">
    <div class="form-group">
      <label>Email Subject</label>
      <input
        type="text"
        name="subject"
        required
        placeholder="e.g. Urgent: Verify your account now"
      />
    </div>
    <div class="form-group">
      <label>Sender Email</label>
      <input
        type="text"
        name="sender"
        required
        placeholder="e.g. support@paypa1.com"
      />
    </div>
    <div class="form-group">
      <label>Reply-To Email (if different)</label>
      <input type="text" name="reply_to" placeholder="e.g. harvest@evil.tk" />
    </div>
    <div class="form-group">
      <label>Email Body</label>
      <textarea
        name="body"
        required
        placeholder="Paste the full email body here..."
      ></textarea>
    </div>
    <div class="form-group">
      <label>Attachments (comma separated filenames, if any)</label>
      <input
        type="text"
        name="attachments"
        placeholder="e.g. invoice.exe, document.docm"
      />
    </div>
    <button type="submit" class="btn btn-primary">Analyze Email</button>
  </form>
</div>
{% endblock %}
