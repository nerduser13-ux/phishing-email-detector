name: DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---- STAGE 1: BUILD ----
  build:
    name: Build & Install
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with Flake8
        run: |
          pip install flake8
          flake8 src/ --max-line-length=120 --ignore=E501,W503 --count

  # ---- STAGE 2: SAST ----
  sast:
    name: SAST - Bandit Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit SAST scan
        run: |
          bandit -r src/ -ll -ii --exclude src/templates -f txt || true

  # ---- STAGE 3: DEPENDENCY SCAN ----
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run dependency scan
        run: |
          pip install -r requirements.txt
          pip-audit --ignore-vuln PYSEC-2022-42974 || true

  # ---- STAGE 4: TESTS ----
  test:
    name: Automated Tests
    runs-on: ubuntu-latest
    needs: sast
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: |
          cd src
          pytest ../tests/ -v --tb=short || true

  # ---- STAGE 5: DEPLOY (Simulated) ----
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Simulate deployment
        run: |
          echo "Running pre-deployment checks..."
          python -c "import src.config if False else print('Config OK')" || true
          echo "Deployment to staging environment successful."
          echo "Application version: $(date +%Y%m%d-%H%M%S)"
